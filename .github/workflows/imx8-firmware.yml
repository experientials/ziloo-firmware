name: i.MX8 Firmware Build Runner

on:
    push:
        branches: [ hw/imx8 ]
        paths:
            - 'device/imx8/**/*'
            - 'device/*'
            - 'manifests/*'
jobs:
    imx8-build:
        runs-on: [big-build]
        name: i.MX8 build running in Docker
        steps:
            - uses: actions/checkout@v2
            - name: create required directories
              run: mkdir workspace
            - name: Run with Docker Compose
              run: |
                docker pull ziloo/image-builder
                docker-compose up -d
            - name: repo from ADLINK i.MX manifest
              run: |
                docker compose exec --workdir=/workspace ziloo-builder repo init -u https://github.com/experientials/ziloo-firmware -b manifests/lec-imx-yocto -m adlink-lec-imx8mp-yocto-hardknott_1v4.xml
                docker compose exec --workdir=/workspace ziloo-builder repo sync
